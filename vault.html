<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Knowledge Vault — Mentorist</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="shared.css">
<style>
body{background:var(--bg);}

/* Hero Section Refinement */
.vault-hero{
  padding:140px 24px 80px;text-align:center;position:relative;overflow:hidden;
  background: radial-gradient(circle at 50% 0%, rgba(0, 232, 122, 0.08) 0%, transparent 70%);
}
.vault-hero::before{
  content:'';position:absolute;inset:0;
  background-image: radial-gradient(circle at 20% 30%, rgba(0, 232, 122, 0.03) 0%, transparent 40%),
                    radial-gradient(circle at 80% 70%, rgba(0, 232, 122, 0.03) 0%, transparent 40%);
  pointer-events:none;
}
.vh-eyebrow{
  display:inline-flex;align-items:center;gap:8px;padding:8px 16px;
  background:var(--green-dim);color:var(--green);border-radius:var(--r-pill);
  font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.1em;
  margin-bottom:24px;border:1px solid rgba(0,232,122,0.2);
  animation: fadeUp 0.6s ease both;
}
.vh-title{
  font-family:var(--font-h);font-size:clamp(40px, 7vw, 72px);font-weight:800;
  color:var(--t1);margin-bottom:20px;letter-spacing:-0.05em;line-height:1;
  animation: fadeUp 0.8s cubic-bezier(0.2, 1, 0.3, 1) both;
}
.vh-sub{
  font-size:18px;color:var(--t3);max-width:640px;margin:0 auto 48px;
  line-height:1.6;animation: fadeUp 1s cubic-bezier(0.2, 1, 0.3, 1) both;
}

/* Search Bar Premium */
.search-outer{
  max-width:720px;margin:0 auto 60px;position:relative;z-index:10;
  animation: fadeUp 1.2s cubic-bezier(0.2, 1, 0.3, 1) both;
}
.search-wrapper{
  display:flex;align-items:center;background:var(--bg-1);
  border:1px solid var(--b2);border-radius:var(--r-2xl);padding:10px 12px;
  transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 30px 60px -12px rgba(0,0,0,0.5);
}
.search-wrapper:focus-within{
  border-color:var(--green);transform:translateY(-4px);
  box-shadow: 0 40px 80px -15px rgba(0,232,122,0.15);
  background:var(--bg-2);
}
.search-icon-box{
  width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  color:var(--t4);transition:color 0.3s;
}
.search-wrapper:focus-within .search-icon-box{color:var(--green);}
.vault-search-input{
  flex:1;background:none;border:none;padding:0 16px;
  font-size:18px;font-weight:500;color:var(--t1);outline:none;
}
.vault-search-input::placeholder{color:var(--t4);}

/* Categories */
.vault-filters{
  display:flex;justify-content:center;gap:12px;flex-wrap:wrap;
  margin-bottom:60px;animation: fadeUp 1.4s cubic-bezier(0.2, 1, 0.3, 1) both;
}

/* Grid Layout */
.vault-container{
  max-width:1300px;margin:0 auto;padding:0 24px 120px;
}
.vault-grid{
  display:grid;grid-template-columns:repeat(auto-fill, minmax(380px, 1fr));gap:32px;
}

/* Luxury Card */
.v-card{
  background:var(--bg-1);border:1px solid var(--b1);border-radius:var(--r-3xl);
  padding:40px;transition:all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  display:flex;flex-direction:column;cursor:pointer;position:relative;
  overflow:hidden;
}
.v-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(0,232,122,0.05), transparent 60%);
  opacity:0;transition:opacity 0.4s;
}
.v-card:hover{
  border-color:var(--b3);transform:translateY(-8px);
  background:var(--bg-2);box-shadow: 0 40px 80px -20px rgba(0,0,0,0.6);
}
.v-card:hover::before{opacity:1;}

.v-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;position:relative;z-index:1;}
.v-tag{
  font-size:11px;font-weight:800;color:var(--green);
  background:var(--green-dim);padding:4px 12px;border-radius:var(--r-pill);
  text-transform:uppercase;letter-spacing:0.05em;border:1px solid rgba(0,232,122,0.1);
}
.v-date{font-size:12px;color:var(--t4);font-weight:600;}

.v-question{
  font-family:var(--font-h);font-size:22px;font-weight:700;color:var(--t1);
  line-height:1.4;margin-bottom:16px;position:relative;z-index:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.v-context{
  font-size:14px;color:var(--t3);line-height:1.7;margin-bottom:32px;
  position:relative;z-index:1;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}

.v-footer{
  margin-top:auto;padding-top:24px;border-top:1px solid var(--b1);
  display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;
}
.v-stats{display:flex;align-items:center;gap:12px;}
.v-mentor-avatars{display:flex;margin-left:4px;}
.v-m-av{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--bg-1);
  background:var(--bg-3);margin-left:-8px;display:flex;align-items:center;
  justify-content:center;font-size:9px;font-weight:800;color:var(--green);
}
.v-m-av:first-child{margin-left:0;}
.v-count-text{font-size:13px;font-weight:700;color:var(--t2);}
.v-action{
  font-size:13px;font-weight:800;color:var(--green);display:flex;
  align-items:center;gap:8px;transition:gap 0.3s;
}
.v-card:hover .v-action{gap:12px;}

/* Detail Modal Premium */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.9);backdrop-filter:blur(15px);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;
}
.modal-window{
  background:var(--bg-1);border:1px solid var(--b1);border-radius:var(--r-3xl);
  max-width:900px;width:100%;max-height:90vh;overflow:hidden;position:relative;
  display:flex;flex-direction:column;box-shadow: 0 50px 100px -20px rgba(0,0,0,1);
  animation:scaleIn 0.5s cubic-bezier(0.2, 1, 0.3, 1);
}
.modal-header{
  padding:40px 60px 24px;position:relative;
  border-bottom:1px solid var(--b1);background:var(--bg-2);
}
.modal-close{
  position:absolute;top:32px;right:32px;width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg-3);border:1px solid var(--b2);border-radius:50%;
  color:var(--t4);cursor:pointer;transition:all 0.2s;
}
.modal-close:hover{color:var(--t1);border-color:var(--t3);transform:rotate(90deg);}

.modal-body{
  padding:60px;overflow-y:auto;flex:1;
}
.modal-body::-webkit-scrollbar{width:8px;}

.m-question-area{margin-bottom:64px;}
.m-q-text{font-family:var(--font-h);font-size:32px;font-weight:800;color:var(--t1);line-height:1.3;margin-bottom:20px;letter-spacing:-0.02em;}
.m-q-context{font-size:16px;color:var(--t3);line-height:1.8;padding-left:24px;border-left:2px solid var(--green);}

.ans-section-title{
  font-size:12px;font-weight:800;color:var(--green);text-transform:uppercase;
  letter-spacing:0.2em;margin-bottom:40px;display:flex;align-items:center;gap:16px;
}
.ans-section-title::after{content:'';flex:1;height:1px;background:var(--b1);}

.ans-item{margin-bottom:48px;padding-bottom:48px;border-bottom:1px solid var(--b1);}
.ans-item:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ans-mentor{display:flex;align-items:center;gap:16px;margin-bottom:24px;}
.ans-m-info{display:flex;flex-direction:column;gap:2px;}
.ans-m-name{font-size:16px;font-weight:700;color:var(--t1);}
.ans-m-bio{font-size:12px;color:var(--t4);font-weight:600;}
.ans-content{font-size:16px;color:var(--t2);line-height:1.9;white-space:pre-wrap;}

@media(max-width:768px){
  .vault-hero{padding:100px 20px 60px;}
  .vault-grid{grid-template-columns:1fr;}
  .v-card{padding:32px;}
  .modal-header, .modal-body{padding:32px 24px;}
  .m-q-text{font-size:24px;}
}

@media(max-width:640px) {
  .vault-hero { padding: 80px 16px 50px; }
  .vh-title { font-size: 32px; }
  .vh-sub { font-size: 15px; margin-bottom: 32px; }
  .search-wrapper { padding: 8px 10px; }
  .vault-search-input { font-size: 16px; }
  .vault-filters { margin-bottom: 40px; }
  .vault-container { padding: 0 16px 80px; }
  .vault-grid { gap: 16px; }
  .v-card { padding: 20px; }
  .v-question { font-size: 18px; -webkit-line-clamp: 2; }
  .modal-window { border-radius: var(--r-2xl); }
  .modal-header { padding: 20px 16px; }
  .modal-body { padding: 24px 16px; }
  .m-q-text { font-size: 20px; }
  .ans-section-title { font-size: 11px; }
}

@media(max-width:500px) {
  .vault-hero { padding: 60px 12px 40px; }
  .search-outer { margin-bottom: 40px; }
  .search-icon-box { width: 40px; height: 40px; }
  .vault-search-input { font-size: 16px; padding: 0 12px; }
  .vh-title { font-size: 28px; }
  .v-card { padding: 16px; }
  .v-question { font-size: 16px; }
  .ans-mentor { gap: 10px; }
  .ans-m-name { font-size: 14px; }
}
</style>
</head>
<body>

<nav class="navbar" id="nav">
  <a href="index.html" class="nav-logo">
    <div class="nav-logomark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <span class="nav-wordmark">Mentorist</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="vault.html" class="nav-link active">Vault</a>
  </div>
  <div class="nav-actions" id="navActions">
    <a href="auth.html?mode=login" class="nav-sign-in">Sign in</a>
    <a href="auth.html?mode=signup" class="nav-get-started">Join Free</a>
  </div>
</nav>

<section class="vault-hero">
  <div class="vh-eyebrow">Strategic Intelligence</div>
  <h1 class="vh-title">Knowledge <span style="color:var(--green);">Vault</span></h1>
  <p class="vh-sub">A curated library of lived-experience guidance. Browse anonymized student inquiries and expert mentor strategies.</p>
  
  <div class="search-outer">
    <div class="search-wrapper">
      <div class="search-icon-box">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <input type="text" class="vault-search-input" id="vaultSearch" placeholder="Search by topic, keyword, or course..." oninput="filterVault()">
    </div>
  </div>

  <div class="vault-filters">
    <button class="tag-pill active" onclick="setF('all', this)">All Insights</button>
    <button class="tag-pill" onclick="setF('STEM', this)">STEM</button>
    <button class="tag-pill" onclick="setF('College Apps', this)">College Apps</button>
    <button class="tag-pill" onclick="setF('Career Prep', this)">Career Prep</button>
    <button class="tag-pill" onclick="setF('Course Strategy', this)">Course Logic</button>
  </div>
</section>

<main class="vault-container">
  <div class="vault-grid" id="vaultGrid"></div>
</main>

<!-- Detail Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal-window" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-close" onclick="closeModal()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </div>
      <div id="modalTags" class="v-tag-group"></div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="nav-logomark" style="width:32px;height:32px;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:16px;height:16px;color:#040404;"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <span style="font-weight:800;color:var(--t2);letter-spacing:-0.02em;">Mentorist</span>
    </div>
    <div style="font-size:13px;font-weight:500;">&copy; 2025 Mentorist. Strategic Resource Hub.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<script>
  let allQuestions = [];
  let activeCategory = 'all';

  function initVault() {
    const user = Auth.getUser();
    if(user) {
      const actions = document.getElementById('navActions');
      actions.innerHTML = `<a href="index.html" class="nav-sign-in">Home</a><a href="${user.role==='mentor'?'mentordashboard.html':user.role==='admin'?'admin.html':'studentdashboard.html'}" class="nav-get-started">My Dashboard</a>`;
    }

    const qs = QuestionStore.getAll();
    allQuestions = qs.filter(q => q.answers && q.answers.length > 0);
    renderVault(allQuestions);
  }

  function setF(cat, el) {
    activeCategory = cat;
    document.querySelectorAll('.vault-filters .tag-pill').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    filterVault();
  }

  function renderVault(qs) {
    const grid = document.getElementById('vaultGrid');
    if(qs.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;">
        <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <h3>No insights found</h3>
        <p>We haven't archived guidance in this category yet. Check back soon.</p>
      </div>`;
      return;
    }

    grid.innerHTML = qs.map((q, idx) => {
      const tag = (q.topics && q.topics.length > 0) ? q.topics[0] : 'Strategy';
      const avs = q.answers.slice(0, 3).map(a => `<div class="v-m-av">${Utils.initials(a.mentorName)}</div>`).join('');
      
      return `
        <div class="v-card stagger" style="animation-delay: ${idx * 0.1}s" onclick="openQuestion('${q.id}')">
          <div class="v-head">
            <span class="v-tag">${tag}</span>
            <span class="v-date">${Utils.relativeDate(q.createdAt)}</span>
          </div>
          <div class="v-question">${q.question}</div>
          <div class="v-context">${q.context || 'Strategic inquiry regarding ' + tag.toLowerCase() + ' development.'}</div>
          <div class="v-footer">
            <div class="v-stats">
              <div class="v-mentor-avatars">${avs}</div>
              <span class="v-count-text">${q.answers.length} Mentor${q.answers.length>1?'s':''}</span>
            </div>
            <div class="v-action">
              Read Guide
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterVault() {
    const term = document.getElementById('vaultSearch').value.toLowerCase();
    const filtered = allQuestions.filter(q => {
      const matchCat = activeCategory === 'all' || (q.topics && q.topics.some(t => t.toLowerCase() === activeCategory.toLowerCase()));
      const matchTerm = q.question.toLowerCase().includes(term) || 
                        (q.topics && q.topics.some(t => t.toLowerCase().includes(term))) ||
                        (q.context && q.context.toLowerCase().includes(term));
      return matchCat && matchTerm;
    });
    renderVault(filtered);
  }

  function openQuestion(id) {
    const q = allQuestions.find(x => x.id === id);
    if(!q) return;

    const tagsEl = document.getElementById('modalTags');
    tagsEl.innerHTML = (q.topics||[]).map(t => `<span class="v-tag">${t}</span>`).join('');

    const body = document.getElementById('modalBody');
    body.innerHTML = `
      <div class="m-question-area">
        <h2 class="m-q-text">${q.question}</h2>
        ${q.context ? `<div class="m-q-context">${q.context}</div>` : ''}
      </div>
      
      <div class="ans-section-title">Mentor Intelligence</div>
      
      ${q.answers.map(a => `
        <div class="ans-item">
          <div class="ans-mentor">
            <div class="avatar avatar-md">${Utils.initials(a.mentorName)}</div>
            <div class="ans-m-info">
              <div class="ans-m-name">${a.mentorName}</div>
              <div class="ans-m-bio">${a.mentorBio || 'Strategic Mentor'}</div>
            </div>
          </div>
          <div class="ans-content">${a.text}</div>
        </div>
      `).join('')}
    `;

    document.getElementById('modalOverlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  initVault();
</script>
</body>
</html>
