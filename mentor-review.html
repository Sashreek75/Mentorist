<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor Review | Mentorist</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <style>
    body { background: var(--bg); color: var(--t1); }
    .review-page { min-height: 100vh; padding: 32px 24px 64px; }
    .review-top {
      max-width: 1180px;
      margin: 0 auto 28px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .review-panel {
      max-width: 1180px;
      margin: 0 auto;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--b1);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow-soft);
    }
    .review-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .review-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--b1);
      border-radius: 20px;
      padding: 20px;
    }
    .review-card h3 { margin: 0 0 10px; font-family: var(--font-h); }
    .review-meta { color: var(--t3); font-size: 14px; margin-bottom: 8px; }
    .review-note { color: var(--t2); line-height: 1.7; margin: 14px 0 18px; }
    .review-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .empty-state, .access-state {
      min-height: 52vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: 14px;
    }
    .access-state {
      max-width: 680px;
      margin: 0 auto;
      align-items: center;
      text-align: center;
    }
    .kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 10px;
      margin-top: 14px;
      color: var(--t2);
      font-size: 14px;
    }
    .kv strong { color: var(--t1); }
    @media (max-width: 720px) {
      .review-page { padding: 18px 14px 48px; }
      .review-panel { padding: 18px; }
      .kv { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="nav-brand">
      <a href="index.html" class="nav-logo">
        <img src="logo.png" alt="Mentorist Logo" class="logo-img" />
        <span>Mentorist</span>
      </a>
    </div>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="mentorapplication.html">Application</a>
      <a href="auth.html">Account</a>
    </nav>
  </header>

  <main class="review-page">
    <section class="review-top">
      <div class="rh-left">
        <p class="section-kicker">Mentor Workflow</p>
        <h1>Mentor <span style="color:var(--green);">Review</span> Status</h1>
        <p>Your mentor account will appear here after Google sign-up or when the admin team reviews the queue.</p>
      </div>
      <div class="review-stats">
        <div class="q-stat" style="min-width: 180px;">
          <div class="q-stat-label">Pending Applications</div>
          <div class="q-stat-val" id="countVal">0</div>
        </div>
      </div>
    </section>

    <section class="review-panel">
      <div id="mentorGrid" class="review-grid"></div>
    </section>
  </main>

  <script>
    const safeText = (value) => String(value ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

    const baseUser = Auth.requireAuth();
    let currentUser = baseUser ? (Auth.syncCurrentUserFromStore(baseUser.email) || baseUser) : null;
    currentUser = Auth.normalizeUser(currentUser);
    const isAdmin = AdminAuth.check();

    if (!currentUser) {
      window.location.href = 'auth.html';
    } else if (currentUser.role === 'mentor' && currentUser.status === 'active') {
      Auth.routeAfterLogin(currentUser);
    }

    function renderMentorApplicantView() {
      const grid = document.getElementById('mentorGrid');
      const count = document.getElementById('countVal');
      const title = document.querySelector('.rh-left h1');
      const summary = document.querySelector('.rh-left p:nth-of-type(2)');

      if (count) count.textContent = '1';
      if (title) title.innerHTML = 'Mentor <span style="color:var(--green);">Review</span> Status';
      if (summary) summary.textContent = 'Your mentor account is waiting for review. Finish any missing details, then check back here for approval updates.';

      const app = currentUser.applicationData || {};
      const status = currentUser.status || 'pending';
      const statusLabel = status === 'rejected' ? 'Rejected' : status === 'active' ? 'Approved' : 'Pending Review';
      const statusTone = status === 'rejected' ? '#f87171' : 'var(--green)';

      grid.innerHTML = `
        <article class="review-card" style="grid-column:1 / -1;">
          <h3>${safeText(currentUser.name || currentUser.email)}</h3>
          <div class="review-meta">${safeText(currentUser.email)}</div>
          <div class="review-note">Your mentor application is currently <strong style="color:${statusTone};">${safeText(statusLabel)}</strong>.</div>
          <div class="kv"><strong>Status</strong><span>${safeText(statusLabel)}</span></div>
          <div class="kv"><strong>University</strong><span>${safeText(app.university || 'Not provided yet')}</span></div>
          <div class="kv"><strong>Major</strong><span>${safeText(app.major || 'Not provided yet')}</span></div>
          <div class="kv"><strong>Experience</strong><span>${safeText(app.experience || 'No statement provided yet')}</span></div>
          <div class="review-actions" style="margin-top:18px;">
            <a href="mentorapplication.html" class="btn btn-primary btn-lg">Finish / Update Application</a>
            <a href="index.html" class="btn btn-ghost btn-lg" style="border:1px solid var(--b1);">Return Home</a>
          </div>
        </article>
      `;
    }

    function renderQueue() {
      if (!isAdmin) return;
      const users = UserStore.getAll();
      const pending = users.filter(u => isMentorApplicant(u) && u.status === 'pending');
      const grid = document.getElementById('mentorGrid');
      const count = document.getElementById('countVal');

      if (count) count.textContent = String(pending.length);

      if (pending.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1 / -1;">
            <div style="font-size:48px; margin-bottom:8px;">OK</div>
            <h2>Queue is Clear</h2>
            <p>All mentor applications have been processed. Great work!</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = pending.map(u => `
        <article class=\"review-card\">
          <h3>${safeText(u.name || 'Unnamed applicant')}</h3>
          <div class=\"review-meta\">${safeText(u.email)}</div>
          <div class=\"review-note\">
            ${safeText(u.applicationData?.experience || 'No statement provided.')}
          </div>
          <div class=\"kv\"><strong>University</strong><span>${safeText(u.applicationData?.university || 'N/A')}</span></div>
          <div class=\"kv\"><strong>Major</strong><span>${safeText(u.applicationData?.major || 'Not provided')}</span></div>
          <div class=\"review-actions\" style=\"margin-top:18px;\">
            <button class=\"btn btn-primary btn-lg\" onclick=\"handleReview(${JSON.stringify(u.email)}, 'active', 'approved')\">Approve Account</button>
            <button class=\"btn btn-ghost btn-lg\" style=\"border:1px solid var(--b1);\" onclick=\"handleReview(${JSON.stringify(u.email)}, 'rejected', 'rejected')\">Reject</button>
          </div>
        </article>
      `).join('');
    }

    function handleReview(email, status, label) {
      const fields = {
        status,
        onboarded: status === 'active',
        approvedAt: status === 'active' ? new Date().toISOString() : null,
        rejectedAt: status === 'rejected' ? new Date().toISOString() : null
      };
      if (status === 'active') fields.role = 'mentor';
      UserStore.updateUserFields(email, fields);
      Utils.toast(`Mentor ${label} successfully.`, 'success');
      renderQueue();
    }

    Promise.resolve(UserStore.refreshFromRemote()).then(() => {
      currentUser = Auth.syncCurrentUserFromStore(currentUser?.email) || Auth.getUser() || currentUser;
      currentUser = Auth.normalizeUser(currentUser);

      if (!currentUser) return;

      if (currentUser.role === 'admin') {
        if (!isAdmin) {
          AdminAuth.require();
          return;
        }
        renderQueue();
        return;
      }

      if (currentUser.role === 'mentor') {
        renderMentorApplicantView();
        return;
      }

      document.body.innerHTML = `
        <div class="access-state">
          <div style="font-size:64px;">LOCK</div>
          <h1 style="font-family:var(--font-h); font-size:32px; margin-bottom:8px;">Access Restricted</h1>
          <p style="color:var(--t3); max-width:480px; line-height:1.7;">This page is reserved for mentor applicants and the admin review queue. If you need mentor access, continue the application flow.</p>
          <a href="index.html" class="btn btn-primary">Return Home</a>
        </div>
      `;
    });
  </script>
</body>
</html>
